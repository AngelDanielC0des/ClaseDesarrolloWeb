<!DOCTYPE html>
<html lang='es-ES'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Gestión de Alumnos</title>
    <link rel='stylesheet' href='styles.css'> 
    <script src="script.js" defer></script> 
</head>
<body>
    <h1>LISTADO DE ALUMNOS</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Curso</th>
                <th>Email</th>
                <th>Borrar</th>
            </tr>
        </thead>
        <tbody id="bodytabla"></tbody>
    </table>
    
    <div class="botones">
        <button onclick="addAlumno()">Añadir Alumno 1</button>
        <button onclick="addAlumnos()">Añadir Todos</button>
        <button id="btn-estadisticas">Estadísticas</button>
        <button id="btn-borrarTodo">Borrar Todo</button>
    </div>
    
    <div id="contenedor-estadisticas" class="contenedorEstadisticas"></div>
</body>
</html>
