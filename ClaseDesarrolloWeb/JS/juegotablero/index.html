<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Formulario+Juego</title>
</head>
<body>
    <form action="">
        <h1>Alta de Usuario</h1>
        <h2>Completa el siguiente formulario para crear una cuenta.</h2>
<br>
       <label for="nombre">Nombre De Usuario</label><input id="nombre" type="text" name="username" placeholder="Ingresa tu username" requiered><img src="" alt=""></input>
       <label for="pass">Contraseña</label><input id="pass" type="password" name="password" placeholder="Ingresa tu contraseña" required> <img src="" alt=""><img src="" alt=""></input>
       <label for="fecha">Fecha de naciomiento</label><input id="fecha" type="date" name="fecha" required><img src="" alt=""><img src="" alt=""></input>
       <label for="confirm">He leido y acepto las <a href="">condiciones</a></label><input id="confirm" name="condiciones" type="checkbox" required>
       <button type="submit">Dar de alta</button>
    </form>  
   
</body>
</html>
