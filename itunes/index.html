<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de iTunes API</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="itunes">&#9835;</div>
    <div class="contenedor-principal">
        <h1>Buscador de Música (iTunes)</h1>
        
        <div class="caja-de-busqueda">
            <input type="text" id="entradaDeBusqueda" placeholder="Busca un artista, canción o álbum...">
            <button id="botonBuscar">Buscar</button>
        </div>

        <div id="contenedorDeResultados" class="cuadricula-de-resultados">
            </div>
    </div>

</body>
</html>
