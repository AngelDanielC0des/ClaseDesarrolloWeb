<!DOCTYPE html>
<html lang="es-Es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <form action="">
        <CODE><h1>Formulario HTML </h1></CODE>
        <div class="usuario">
        <label for="usuario">Usuario</label>
        <input id="usuario" type="text" name="usuario" required placeholder="Angel">
    </div>
    <div class="pass">
        <label for="password">Contraseña</label>
        <input id="password" type="password" name="password" placeholder="Secret" required>
    </div>
    <div class="repeatpass">
        <label for="repeatPassword">Repite tu contraseña</label>
        <input id="repeatPassword" type="password" name="password" placeholder="Secret" required>
    </div>
   
    <fieldset class="sexo">
        <legend>Sexo</legend>

        
    </fieldset>
    <div class="condiciones">
        <input id="privacidad" name="privacidad" type="checkbox" required>
            <label for="privacidad">Acepto las condiciones</label>
        </div>
         <div class="botones">
        <button type="submit">Enviar</button>
        <button type="reset">Limpiar</button>
    </div>
    </form>
</body>
</html>
