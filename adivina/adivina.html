    <script language="javascript" defer>



        function cogerpalabra() {
            let palabraOriginal = document.getElementById("palabra").value;
            esPalindromo(palabraOriginal)
        }
      

        function esPalindromo(palabraOriginal) {
            let palabraReves = "";

            for (let i = palabraOriginal.length - 1; i >= 0; i--) {
                let letraActual = palabraOriginal[i]
                palabraReves = palabraReves + letraActual;

            }

            if (palabraReves == palabraOriginal) {
                console.log(`${palabraOriginal} es un palíndromo`)
            }
            else { console.log(`${palabraOriginal} no es un palíndromo`) }

        }


    </script>

    <input type="text" id="palabra">
    <button onclick="cogerpalabra();">Empieza</button>

</body>
