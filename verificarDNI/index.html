<!DOCTYPE html>
<html lang="es-es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script defer src="script.js">
    </script>

    <title>
        Verificador DNI / NIE
    </title>

</head>

<body class="bg-light">

    <div class="container mt-5">

        <form class="p-4 border rounded shadow-sm bg-white" onsubmit="verificarDNI(event)">

            <h2 class="mb-4 text-center">
                Verificador de DNI / NIE
            </h2>

            <div class="row g-3">

                <!-- Número DNI / NIE -->
                <div class="col-md-7">

                    <label for="numeroDNI" class="form-label fw-bold">

                        Número DNI / NIE

                    </label>

                    <input type="text" id="numeroDNI" name="numeroDNI" class="form-control text-uppercase" required
                        placeholder="Ej: 12345678 o X1234567" pattern="([XYZxyz][0-9]{7}|[0-9]{8})"
                        title="Debe contener 8 números o X/Y/Z + 7 números(NIE)">

                </div>

                <!-- Letra -->
                <div class="col-md-5">

                    <label for="letraDNI" class="form-label fw-bold">

                        Letra

                    </label>

                    <input type="text" id="letraDNI" name="letraDNI" class="form-control text-uppercase" required
                        maxlength="1" placeholder="Ej: Z" pattern="[A-Za-z]{1}" title="Debe contener una única letra">

                </div>

                <!-- Botón -->
                <div class="col-12">

                    <button type="button" id="botonVerificar" class="btn btn-primary w-100 fw-bold mt-3"
                        onclick="verificarDNI()">


                        Verificar DNI / NIE

                    </button>

                </div>

            </div>

        </form>

        <!-- Resultado -->
        <div id="resultadodni" class="mt-4">
        </div>

    </div>

    <!-- Templates -->

    <template id="templateAcierto">

        <div class="alert alert-success text-center fw-bold">

            ✅ Documento verificado correctamente

        </div>

    </template>

    <template id="templateFallo">

        <div class="alert alert-danger text-center fw-bold">

            ❌ Documento incorrecto

        </div>

    </template>

</body>

</html>
